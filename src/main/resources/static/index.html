<body x-data="manageMenus()">

  <!-- ======= Header ======= -->
  <header id="header" class="header fixed-top d-flex align-items-center">
    <div class="container d-flex align-items-center justify-content-between">

      <nav id="navbar" class="navbar">

          <li><a href="#menus">Menus</a></li>
          <li><a href="#menu">Plats</a></li>
          <li><a href="#book-a-table">Nouveau plat</a></li>
        </ul>
      </nav><!-- .navbar -->

      <i class="mobile-nav-toggle mobile-nav-hide d-none bi bi-x"></i>

  </header><!-- End Header -->


  <main id="main">

    <!-- ======= Menus Section ======= -->
    <section id="menus" class="week-menu section-bg">
      <div class="container" data-aos="fade-up">

        <div class="section-header">
          <h2 x-show="mealPlan.week.current">semaine courante</h2>
          <p>
            <button @click="goToWeek(mealPlan.week.previousWeek.year, mealPlan.week.previousWeek.number)" style="all: unset; cursor: pointer;"><-&nbsp;</button>
            Semaine <span x-text="mealPlan.week.number"></span>
            <button @click="goToWeek(mealPlan.week.nextWeek.year, mealPlan.week.nextWeek.number)" style="all: unset; cursor: pointer;">&nbsp;-></button>
          </p>
        </div>

        <div class="row gy-1">

          <div class="col-lg-12 d-flex">
            <div class="row gy-4">
              <div class="col-xl-3" data-aos="fade-up" data-aos-delay="200">
                <div class="icon-box week-infos">
                  <div class="season-img w-100">
                    <img :src="getSeasonPicture(mealPlan.week.start)" class="img-fluid">
                  </div>
                  <div class="btn-actions">
                    <button class="btn btn-sm btn-action" x-show="mealPlan.status == 'DRAFT' && !mealPlan.is_finished" x-on:click="generateWeek(mealPlan.year, mealPlan.number)"><span class="bi-arrow-clockwise"></span> Regénérer</button>

                    <button class="btn btn-sm btn-action" x-show="mealPlan.status == 'DRAFT' && !mealPlan.is_finished" x-on:click="changeWeekStatus(mealPlan.year, mealPlan.number, 'save')"><span class="bi-check-circle"></span> Enregistrer</button>

                    <button class="btn btn-sm btn-action" x-show="mealPlan.status == 'SAVED' && !mealPlan.is_finished" href="#"  x-on:click="changeWeekStatus(mealPlan.year, mealPlan.number, 'edit')"><span class="bi-pen"></span> Modifier</button>
                  </div>
                </div>
              </div>

              <template x-for="day in mealPlan.days" :key="day.dayOfWeek">
                <div class="col-xl-3" data-aos="fade-up" data-aos-delay="200">
                  <div class="icon-box align-items-center" :class="{ 'today': day.today }">
                    <h4 x-text="frenchDay(day.dayOfWeek)">{{ day.dayOfWeek }}</h4>
                    <template x-for="meal in day.meals" :key="meal.type">
                      <div>
                        <p x-show="day.meals.length == 1">&nbsp;</p>
                        <p>
                          <hr x-show="meal.type == 'Soir'" class="dotted">
                          <span x-text="meal.dish.label"></span>
                          <span x-show="meal.dish.vegan">🌱</span>
                          <span x-show="meal.dish.fish">🐟</span>
                          <span x-show="meal.dish.fromRestaurant">💸</span>
                          <span x-show="meal.dish.quick">🚀</span>
                          <span x-show="meal.dish.slow">🐌</span>
                          <span x-show="meal.dish.kidLunch">👦🏼</span>
                        </p>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </section><!-- End Menus Section -->

    <!-- Menu Section -->
    <section id="menu" class="menu section">

      <div class="section-header">
        <h2><span x-text=filteredDishes.length></span> plats disponibles</h2>
        <p>
          La <span>carte</span>
        </p>
      </div>
      <div class="container">
        <div class="tab-content" data-aos="fade-up" data-aos-delay="200">
          <div class="tab-pane fade active show" id="menu-starters">
            <div class="row g-12">
              <div class="col-lg-12">
                <div class="input-group py-2">
                  <span class="input-group-text" id="basic-addon1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                    </svg>
                  </span>
                  <input type="text" class="form-control" placeholder="Filtrer" x-model="searchDish" aria-describedby="basic-addon1">
                </div>
              </div>
            </div>
            <div class="row gy-2">
              <template x-for="dish in filteredDishes" :key="dish.label">
                <div class="col-lg-3 menu-item">
                  <a class="glightbox"><img src="assets/img/default-dish.jpg" class="menu-img img-fluid" alt=""></a>
                  <h4 x-text="dish.label"></h4>
                  <p class="ingredients">
                    <span x-show="dish.vegan">🌱</span>
                    <span x-show="dish.fish">🐟</span>
                    <span x-show="dish.fromRestaurant">💸</span>
                    <span x-show="dish.quick">🚀</span>
                    <span x-show="dish.slow">🐌</span>
                    <span x-show="dish.kidLunch">👦🏼</span>
                  </p>
                </div><!-- Menu Item -->
              </template>
            </div>
          </div><!-- End Starter Menu Content -->
        </div>
      </div>
    </section><!-- /Menu Section -->

    <!-- ======= Book A Table Section ======= -->
    <section id="book-a-table" class="book-a-table">
      <div class="container" data-aos="fade-up">

        <div class="section-header">
          <p>Compléter la <span>carte</span></p>
        </div>
        <div class="row g-0">
          <div class="col-lg-4 reservation-img" style="background-image: url(assets/img/cocotte.jpg);" data-aos="zoom-out" data-aos-delay="200"></div>
          <div class="col-lg-8 align-items-center reservation-form-bg">
            <form @submit.prevent="submitForm" x-data="newDishForm()" role="form" class="php-email-form" data-aos="fade-up" data-aos-delay="100">
              <div class="row gy-4">
                <div class="col-12">
                  <input x-model="newDishFormData.label" type="text" name="label" class="form-control" id="label" placeholder="Libellé" data-rule="minlen:4" data-msg="Please enter at least 4 chars">
                  <div class="validate"></div>
                </div>
                <div class="col-2">
                  <div class="form-check">
                    <input x-model="newDishFormData.vegan" class="form-check-input" type="checkbox" value="" id="veganFilter">
                    <label class="form-check-label" for="veganFilter">&nbsp;🌱</label>
                  </div>
                </div>
                <div class="col-2">
                  <div class="form-check">
                    <input x-model="newDishFormData.fish" class="form-check-input" type="checkbox" value="" id="fishFilter">
                    <label class="form-check-label" for="fishFilter">&nbsp;🐟</label>
                  </div>
                </div>
                <div class="col-2">
                  <div class="form-check">
                    <input x-model="newDishFormData.quick" class="form-check-input" type="checkbox" value="" id="quickFilter">
                    <label class="form-check-label" for="quickFilter">&nbsp;🚀</label>
                  </div>
                </div>
                <div class="col-2">
                  <div class="form-check">
                    <input x-model="newDishFormData.long" class="form-check-input" type="checkbox" value="" id="longFilter">
                    <label class="form-check-label" for="longFilter">&nbsp;🐌</label>
                  </div>
                </div>
                <div class="col-2">
                  <div class="form-check">
                    <input x-model="newDishFormData.fromRestaurant" class="form-check-input" type="checkbox" value="" id="restaurantFilter">
                    <label class="form-check-label" for="restaurantFilter">&nbsp;💸</label>
                  </div>
                </div>
                <div class="col-2">
                  <div class="form-check">
                    <input x-model="newDishFormData.kidLunch" class="form-check-input" type="checkbox" value="" id="kidLunchFilter">
                    <label class="form-check-label" for="kidLunchFilter">&nbsp;👦🏼</label>
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <div class="loading">Loading</div>
                <div class="error-message">Error</div>
                <div class="sent-message" x-show="newDishSuccessMessage" x-text="newDishSuccessMessage"></div>
              </div>
              <div class="text-center"><button type="submit" x-on:click="addDish()">Enregistrer</button></div>
            </form>
          </div><!-- End Reservation Form -->

        </div>

      </div>
    </section><!-- End Book A Table Section -->

  <script>

  const manageMenus = () => ({
      baseUrl: window.location.hostname === 'localhost' ? 'http://localhost:8080/api' : 'https://sasagui.fr/onmangequoi/api/'
      months: ['janvier', 'février', 'mars', 'avril', 'mai' ,'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'],
      mealPlan: {
        days: []
      },
      dishes: [],
      searchDish: '',
      newDishFormData: null,
      newDishSuccessMessage: 'Toto',

      async init() {
          await this.getCurrentWeek()
          await this.getDishes()
      },

      getDishes() {
        fetch(this.baseUrl + '/dishes', {
          method: 'GET'
        })
          .then((response) => response.json())
          .then((json) => this.dishes = json);
      },

      newDishForm() {
        return {
          newDishFormData: {
            label: '',
            fromRestaurant: false,
            vegan: false,
            slow: false,
            quick: false,
            fish: false,
            kidLunch: false
          }
        };
      },

      async addDish() {
        event.preventDefault();
        await fetch(this.baseUrl + '/dishes', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            'label': this.newDishFormData.label,
            'fromRestaurant': this.newDishFormData.fromRestaurant,
            'vegan': this.newDishFormData.vegan,
            'fish': this.newDishFormData.fish,
            'long': this.newDishFormData.long,
            'quick': this.newDishFormData.quick,
            'kidLunch': this.newDishFormData.kidLunch
          })
        })
        .then((json) =>  {
          this.newDishSuccessMessage = 'Nouveau plat enregistré';
          this.getDishes()
        });
      },

      get filteredDishes() {
        return this.dishes.filter(
          d => d.label.toLowerCase().includes(this.searchDish.toLowerCase())
        )
      },

      async getCurrentWeek() {
        await fetch(this.baseUrl + '/meal-plans/current')
          .then((response) => response.json())
          .then((json) => this.mealPlan = json);
      },

      setMealPlan(json) {
        this.mealPlan = json;
      },

      async goToWeek(year, number) {
        await fetch(this.baseUrl + '/meal-plans/year/' + year + '/week/' + number)
          .then((response) => response.json())
          .then((json) => this.mealPlan = json);
      },

      async generateWeek(year, number) {
        await fetch(this.baseUrl + '/meal-plans/year/' + year + '/week/' + number + '?generate=true')
          .then((response) => response.json())
          .then((json) =>  {
            this.setMealPlan(json)
          });
      },

      async changeWeekStatus(year, number, action) {
        await fetch(this.baseUrl + '/week/' + year + '/' + number, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            action: action,
          })
        })
        .then((response) => response.json())
        .then((json) =>  {
          this.setMealPlan(json)
        });
      },

      getSeasonPicture(dateString) {
        getSeason = d => Math.floor((d.getMonth() / 12 * 4)) % 4;
        return 'assets/img/' + ['winter.jpg', 'spring.jpg', 'summer.webp', 'autumn.avif'][getSeason(new Date(dateString))];
      },

      getMonthLabel(month) {
        return this.months[month];
      },

      frenchDay(day) {
            const mapping = {
                MONDAY: 'lundi',
                TUESDAY: 'mardi',
                WEDNESDAY: 'mercredi',
                THURSDAY: 'jeudi',
                FRIDAY: 'vendredi',
                SATURDAY: 'samedi',
                SUNDAY: 'dimanche'
            };
            return mapping[day] || day;
        }
  })
  </script>
