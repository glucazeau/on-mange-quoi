<body x-data="manageMenus()">

  <header id="header" class="header fixed-top d-flex align-items-center">
    <div class="container d-flex align-items-center justify-content-between">

      <a x-on:click="getCurrentWeek()" class="logo d-flex align-items-center me-auto me-lg-0" style="all: unset; cursor: pointer;">

      <nav id="navbar" class="navbar">
        <ul>
          <li><a href="#menus">Menus</a></li>
          <li><a href="#menu">Plats</a></li>
          <li><a href="#book-a-table">Nouveau plat</a></li>

      </nav><!-- .navbar -->

  <main id="main">

    <!-- ======= Menus Section ======= -->
    <section id="menus" class="week-menu section-bg">
      <div class="container" data-aos="fade-up">

        <div class="section-header">
          <h2 x-show="mealPlan?.week?.current">semaine courante</h2>
          <p>
            <button @click="goToWeek(mealPlan.week.previousWeek.year, mealPlan.week.previousWeek.number)" style="all: unset; cursor: pointer;"><-&nbsp;</button>
            Semaine <span x-text="mealPlan?.week?.number"></span>
            <button @click="goToWeek(mealPlan.week.nextWeek.year, mealPlan.week.nextWeek.number)" style="all: unset; cursor: pointer;">&nbsp;-></button>
          </p>
        </div>

        <div class="row gy-1">

          <div class="col-lg-12 d-flex">
            <div class="row gy-4">
              <div class="col-xl-3" data-aos="fade-up" data-aos-delay="200">
                <div class="icon-box week-infos">
                  <div class="season-img w-100">
                    <img :src="getSeasonPicture(mealPlan?.week?.start)" class="img-fluid">
                  </div>
                  <div class="btn-actions">
                    <button class="btn btn-sm btn-action" x-show="mealPlan.status == 'DRAFT' && !mealPlan.is_finished" x-on:click="generateWeek(mealPlan.year, mealPlan.number)"><span class="bi-arrow-clockwise"></span> Regénérer</button>

                    <button class="btn btn-sm btn-action" x-show="mealPlan.status == 'DRAFT' && !mealPlan.is_finished" x-on:click="changeWeekStatus(mealPlan.year, mealPlan.number, 'save')"><span class="bi-check-circle"></span> Enregistrer</button>

                    <button class="btn btn-sm btn-action" x-show="mealPlan.status == 'SAVED' && !mealPlan.is_finished" href="#"  x-on:click="changeWeekStatus(mealPlan.year, mealPlan.number, 'edit')"><span class="bi-pen"></span> Modifier</button>
                  </div>
                </div>
              </div>

              <template x-for="day in mealPlan.days" :key="day.dayOfWeek">
                <div class="col-xl-3" data-aos="fade-up" data-aos-delay="200">
                  <div class="icon-box align-items-center" :class="{ 'today': day.today }">
                    <h4 x-text="frenchDay(day.dayOfWeek)">{{ day.dayOfWeek }}</h4>
                    <template x-for="meal in day.meals" :key="meal.type">
                      <div
                          :class="{
                             'drop-zone': !day.past && draggingDish,
                             'highlight': !day.past && draggingDish && draggingOverZone
                           }"
                          x-data="{
                           draggingOverZone: false,
                           dayId: day.dayOfWeek,
                           mealType: meal.type
                         }"
                          @mouseenter="draggingOverZone = true"
                          @mouseleave="draggingOverZone = false"
                          @dragover.prevent="draggingOverZone = true"
                          @dragleave="draggingOverZone = false"
                          @drop="handleDrop">
                        <p x-show="day.meals.length == 1">&nbsp;</p>
                        <p>
                          <hr x-show="meal.type == 'DINNER'" class="dotted">
                          <span x-text="meal.dish.label"></span>
                          <span x-show="meal.dish.vegan">🌱</span>
                          <span x-show="meal.dish.fish">🐟</span>
                          <span x-show="meal.dish.fromRestaurant">💸</span>
                          <span x-show="meal.dish.quick">🚀</span>
                          <span x-show="meal.dish.slow">🐌</span>
                          <span x-show="meal.dish.kidLunch">👦🏼</span>
                        </p>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </section><!-- End Menus Section -->

    <!-- Menu Section -->
    <section id="menu" class="menu section">

      <div class="section-header">
        <h2><span x-text=filteredDishes.length></span> plats disponibles</h2>
        <p>
          La <span>carte</span>
        </p>
      </div>
      <div class="container">
        <div class="tab-content" data-aos="fade-up" data-aos-delay="200">
          <div class="tab-pane fade active show" id="menu-starters">
            <div class="row g-12">
              <div class="col-lg-12">
                <div class="input-group py-2">
                  <span class="input-group-text" id="basic-addon1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                    </svg>
                  </span>
                  <input type="text" class="form-control" placeholder="Filtrer" x-model="searchDish" aria-describedby="basic-addon1">
                </div>
              </div>
            </div>
            <div class="row gy-2">
              <template x-for="dish in filteredDishes" :key="dish.id">
                <div class="col-auto menu-item"
                     x-data="{ hover: false }"
                     @mouseenter="hover = true"
                     @mouseleave="hover = false">
                  <div class="border rounded px-3 py-2 bg-light"
                       draggable="true"
                       x-data="{ dishId: dish.id }"
                       @dragstart="document.body.style.cursor = 'grabbing'; draggingDish = true; event.dataTransfer.setData('dishId', dishId)"
                       @dragend="document.body.style.cursor = 'default'; draggingDish = false"
                  >
                    <span x-text="dish.label"></span>
                    <span x-show="dish.availableAllYear">🗓️</span>
                    <span x-show="dish.vegan">🌱</span>
                    <span x-show="dish.fish">🐟</span>
                    <span x-show="dish.fromRestaurant">💸</span>
                    <span x-show="dish.quick">🚀</span>
                    <span x-show="dish.slow">🐌</span>
                    <span x-show="dish.kidLunch">👦🏼</span>
                  </div>
                  <div class="dish-edit d-flex align-items-center">
                    <i x-show="hover" @click="openEditDish(dish)" class="icon bi bi-pencil flex-shrink-0"></i>
                  </div>
                </div>
              </template>
            </div>
          </div><!-- End Starter Menu Content -->
        </div>
      </div>
    </section><!-- /Menu Section -->

    <!-- ======= Book A Table Section ======= -->
    <section id="book-a-table" class="book-a-table">
      <div class="container" data-aos="fade-up">

        <div class="section-header">
          <p>Compléter la <span>carte</span></p>
        </div>
        <div class="row g-0">
          <div class="col-lg-4 reservation-img" style="background-image: url(assets/img/cocotte.jpg);" data-aos="zoom-out" data-aos-delay="200"></div>
          <div class="col-lg-8 align-items-center reservation-form-bg">
            <form @submit.prevent="saveDish" role="form" class="php-email-form" data-aos="fade-up" data-aos-delay="100">
              <div class="row gy-4">
                <div class="col-12">
                  <input x-model="dishForm.label" x-ref="dishFormLabel" type="text" name="label" class="form-control" id="label" placeholder="Libellé" data-rule="minlen:4" data-msg="Please enter at least 4 chars">
                  <div class="validate"></div>
                </div>
                <div class="col-sm-4 col-lg-2">
                  <div class="form-check">
                    <input x-model="dishForm.vegan" class="form-check-input" type="checkbox" value="" id="veganFilter">
                    <label class="form-check-label" for="veganFilter">&nbsp;🌱</label>
                  </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                  <div class="form-check">
                    <input x-model="dishForm.fish" class="form-check-input" type="checkbox" value="" id="fishFilter">
                    <label class="form-check-label" for="fishFilter">&nbsp;🐟</label>
                  </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                  <div class="form-check">
                    <input x-model="dishForm.quick" class="form-check-input" type="checkbox" value="" id="quickFilter">
                    <label class="form-check-label" for="quickFilter">&nbsp;🚀</label>
                  </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                  <div class="form-check">
                    <input x-model="dishForm.slow" class="form-check-input" type="checkbox" value="" id="slowFilter">
                    <label class="form-check-label" for="slowFilter">&nbsp;🐌</label>
                  </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                  <div class="form-check">
                    <input x-model="dishForm.fromRestaurant" class="form-check-input" type="checkbox" value="" id="restaurantFilter">
                    <label class="form-check-label" for="restaurantFilter">&nbsp;💸</label>
                  </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                  <div class="form-check">
                    <input x-model="dishForm.kidLunch" class="form-check-input" type="checkbox" value="" id="kidLunchFilter">
                    <label class="form-check-label" for="kidLunchFilter">&nbsp;👦🏼</label>
                  </div>
                </div>
                <template x-for="month in months" :key="month.value">
                  <div class="col-sm-4 col-lg-2">
                    <div class="form-check">
                      <input
                              type="checkbox"
                              class="form-check-input"
                              :id="'month-' + month.value"
                              :value="month.value"
                              x-model="dishForm.months"
                      >
                      <label class="form-check-label-month" :for="'month-' + month.value">
                        &nbsp;<span x-text="month.label"></span>
                      </label>
                    </div>
                  </div>
                </template>
              </div>
              <div class="mb-3">
                <div class="loading">Loading</div>
                <div class="error-message" x-show="dishFormErrorMessage" x-text="dishFormErrorMessage"></div>
                <div class="sent-message" x-show="dishFormSuccessMessage" x-text="dishFormSuccessMessage" x-transition></div>
              </div>
              <div class="buttons">
                <div class="text-center">
                  <button type="submit">
                    <i class="bi bi-floppy-fill me-2"></i>
                    <span x-text="isEditing ? 'Mettre à jour' : 'Enregistrer'"></span>
                  </button>
                </div>
                <div class="text-center">
                  <button type="button" x-on:click="resetForm()" x-show="isEditing">
                    <i class="bi bi-x-circle-fill me-2"></i>
                    <span x-text="'Annuler'"></span>
                  </button>
                </div>
              </div>
            </form>
          </div><!-- End Reservation Form -->

        </div>

      </div>
    </section><!-- End Book A Table Section -->

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/mustache@latest"></script>
  <script>

  const manageMenus = () => ({
      baseUrl: window.location.hostname === 'localhost' ? 'http://localhost:8080/api' : 'https://sasagui.fr/onmangequoi/api/',
      months: [
        { value: 1, label: 'janvier' },
        { value: 2, label: 'février' },
        { value: 3, label: 'mars' },
        { value: 4, label: 'avril' },
        { value: 5, label: 'mai' },
        { value: 6, label: 'juin' },
        { value: 7, label: 'juillet' },
        { value: 8, label: 'août' },
        { value: 9, label: 'septembre' },
        { value: 10, label: 'octobre' },
        { value: 11, label: 'novembre' },
        { value: 12, label: 'décembre' }
      ],
      mealPlan: {
        days: []
      },
      dishes: [],
      searchDish: '',
      dishForm: null,
      isEditing: false,
      dishFormSuccessMessage: '',
      dishFormErrorMessage: '',
      draggingDish: false,

      async init() {
          await this.getCurrentWeek()
          await this.getDishes()
      },

      getDishes() {
        fetch(this.baseUrl + '/dishes', {
          method: 'GET'
        })
          .then((response) => response.json())
          .then((json) => this.dishes = json);
      },

      // default form
      dishForm: {
        id: '',
        label: '',
        fromRestaurant: false,
        vegan: false,
        slow: false,
        quick: false,
        fish: false,
        kidLunch: false,
        months: []
      },

      // helper to reset form (also used for "create")
      resetForm() {
        this.isEditing = false
        this.dishForm = {
          id: '',
          label: '',
          fromRestaurant: false,
          vegan: false,
          slow: false,
          quick: false,
          fish: false,
          kidLunch: false,
          months: []
        }
      },

      // called for editing an existing dish
      openEditDish(dish) {
        this.isEditing = true
        this.dishForm = {
          id: dish.id,
          label: dish.label,
          fromRestaurant: dish.fromRestaurant,
          vegan: dish.vegan,
          slow: dish.slow,
          quick: dish.quick,
          fish: dish.fish,
          kidLunch: dish.kidLunch,
          months: dish.months
        }
        this.$nextTick(() => {
          // Focus on the name input when editing starts
          this.$refs.dishFormLabel?.focus();
        });
      },

      async saveDish() {
        const url = this.isEditing ? `/dishes/${this.dishForm.id}` : `/dishes`;

        const method = this.isEditing ? 'PUT' : 'POST';

        try {
          const response = await fetch(this.baseUrl + url, {
            method: method,
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(this.dishForm)
          });

          // Check if the response is OK (status 2xx)
          if (!response.ok) {
            // If response is not OK (e.g., 4xx, 5xx), throw the response data to be caught in the catch block
            const errorData = await response.json();
            throw errorData;
          }

          // Handle success: update UI, reset form, and fetch dishes
          this.dishFormSuccessMessage = 'Enregistré';
          setTimeout(() => {
            this.dishFormSuccessMessage = null;
          }, 10000);

          this.resetForm();
          this.getDishes();

        } catch (err) {
          // Handle errors: if the response has a structured error message
          if (err.errors && Array.isArray(err.errors) && err.errors.length > 0) {
            this.dishFormErrorMessage = err.errors[0].errorMessage;
          } else {
            // Fallback error message
            this.dishFormErrorMessage = 'An unknown error occurred.';
          }

          // Hide the error message after a short time
          setTimeout(() => {
            this.dishFormErrorMessage = null;
          }, 10000);
        }
      },

      get filteredDishes() {
        return this.dishes.filter(
          d => d.label.toLowerCase().includes(this.searchDish.toLowerCase())
        )
      },

      async getCurrentWeek() {
        await fetch(this.baseUrl + '/meal-plans/current')
          .then((response) => response.json())
          .then((json) => this.mealPlan = json);
      },

      setMealPlan(json) {
        this.mealPlan = json;
      },

      async goToWeek(year, number) {
        await fetch(this.baseUrl + '/meal-plans/year/' + year + '/week/' + number)
          .then((response) => response.json())
          .then((json) => this.mealPlan = json);
      },

      async generateWeek(year, number) {
        await fetch(this.baseUrl + '/meal-plans/year/' + year + '/week/' + number + '?generate=true')
          .then((response) => response.json())
          .then((json) =>  {
            this.setMealPlan(json)
          });
      },

      handleDrop(event) {
        const dishId = event.dataTransfer.getData('dishId');
        const dayId = this.dayId;
        const mealType = this.mealType;
        this.draggingDish = false;

        // Call your API with BOTH values
        fetch(this.baseUrl + '/meals/year/' + this.mealPlan.week.year + '/week/' + this.mealPlan.week.number + '/day/' + dayId + '/meal/' + mealType, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: dishId
        })
        .then((response) => response.json())
        .then((json) =>  {
          this.setMealPlan(json)
        });
     },

      async changeWeekStatus(year, number, action) {
        await fetch(this.baseUrl + '/week/' + year + '/' + number, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            action: action,
          })
        })
        .then((response) => response.json())
        .then((json) =>  {
          this.setMealPlan(json)
        });
      },

      getSeasonPicture(dateString) {
        if (!dateString) return '';
        const d = new Date(dateString + "T00:00:00");
        const season = Math.floor((d.getMonth() / 12) * 4) % 4;
        return 'assets/img/' + ['winter.jpg', 'spring.jpg', 'summer.webp', 'autumn.avif'][season];
      },

      getMonthLabel(month) {
        return this.months[month];
      },

      frenchDay(day) {
            const mapping = {
                MONDAY: 'lundi',
                TUESDAY: 'mardi',
                WEDNESDAY: 'mercredi',
                THURSDAY: 'jeudi',
                FRIDAY: 'vendredi',
                SATURDAY: 'samedi',
                SUNDAY: 'dimanche'
            };
            return mapping[day] || day;
        }
  })
  </script>
