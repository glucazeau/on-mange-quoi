databaseChangeLog:
  - changeSet:
      id: 1
      author: Guillaume
      changes:
        - createTable:
            tableName: dish
            columns:
              - column:
                  name: dish_id
                  type: INTEGER
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_slow
                  type: BOOLEAN
                  constraints:
                    nullable: true
              - column:
                  name: is_quick
                  type: BOOLEAN
                  constraints:
                    nullable: true
              - column:
                  name: is_from_restaurant
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: is_vegan
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: Guillaume
      changes:
        - addNotNullConstraint:
            tableName: dish
            columnName: is_slow
            defaultNullValue: false
        - addNotNullConstraint:
            tableName: dish
            columnName: is_quick
            defaultNullValue: false

  - changeSet:
      id: 002-create-meal-table
      author: Guillaume
      changes:
        - createTable:
            tableName: meal
            columns:
              - column:
                  name: plan_year
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: week_number
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: day_of_week
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: meal_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: dish_id
                  type: SMALLINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: meal
            columnNames: plan_year, week_number, day_of_week, meal_type
            constraintName: pk_meal
        - addForeignKeyConstraint:
            baseTableName: meal
            baseColumnNames: dish_id
            referencedTableName: dish
            referencedColumnNames: dish_id
            constraintName: fk_meal_dish

  - changeSet:
      id: add-fish-and-kid-column
      author: Guillaume
      changes:
        - addColumn:
            tableName: dish
            columns:
              - column:
                  name: is_fish
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: is_kid_lunch
                  type: BOOLEAN
                  defaultValueBoolean: false

  -  changeSet:
       id:  add-unique-constraint-on-dish-label
       author:  Guillaume
       changes:
         -  addUniqueConstraint:
              tableName:  dish
              columnNames:  label
              constraintName:  unique-dish-label

  - changeSet:
      id: add-dish-month-table
      author: Guillaume
      changes:
        - createTable:
            tableName: dish_month
            columns:
              - column:
                  name: dish_id
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: month_number
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
